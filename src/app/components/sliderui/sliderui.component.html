<c-carousel styleClass="slider" id="slider" transition="crossfade">
    <c-carousel-indicators></c-carousel-indicators>
    <c-carousel-inner>
      <c-carousel-item *ngFor="let slide of slides" [ngStyle]="slide.bg ? {'background-image': 'url(' + slide.bg + ')'} : (slide.bgColor ? {'background-color': slide.bgColor} : null)" [class.slide-with-bg]="slide.bg">
        <div [class]="slide.shellClass || 'hero-shell'">
          <div [class]="slide.copyClass || 'hero-copy'">
            <div class="hero-copy__inner">
              <h1 [class]="slide.titleClass || ''">{{slide.title}}</h1>
              <p *ngIf="slide.subtitle">{{slide.subtitle}}</p>
              <a *ngIf="slide.button" class="btn btn-light text-uppercase fw-bold hero-cta" [href]="slide.href | safeUrl" [target]="slide.target">{{slide.button}}</a>
            </div>
          </div>
          <div *ngIf="slide.src" [class]="slide.mediaClass || 'hero-media'">
            <img
              alt="{{slide.title}}"
              [class]="slide.imageClass || 'hero-image'"
              loading="lazy"
              src="{{slide.src}}"
            />
          </div>
        </div>
      </c-carousel-item>
    </c-carousel-inner>
  </c-carousel>
